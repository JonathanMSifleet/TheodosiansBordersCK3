l_english:
 h_roman_empire_tooltip: "The Roman Empire hegemony encompasses both the Western and Eastern Roman territories."
 e_western_roman_empire: "Western Roman Empire"
 e_western_roman_empire_adj: "Western Roman"
 restore_roman_empire_decision: "Restore Theodosius's Roman Empire"
 restore_roman_empire_decision_confirm: "I will restore the divided Empire"
 restore_roman_empire_decision_tooltip: "The Roman Empire will be restored, divided as Theodosius intended"
 restore_roman_empire_decision_desc: "The great Emperor Theodosius understood that no single man could govern so vast an empire. He divided it between East and West — each half complementing the other. If Rome and the key territories are reclaimed, that ancient order can be restored: a Western Roman Empire centered on Italy, and an Eastern Empire at Constantinople, both united under the Roman Hegemony."
 restore_roman_empire_decision_effect_tooltip: "The Roman Empire hegemony will be restored. The Western Roman Empire will be created as a vassal, alongside the Eastern Roman Empire — as Theodosius intended."
 roman_restoration.0001.t: "Theodosius's Order Restored"
 roman_restoration.0001.desc.intro: "Friends, Romans, countrymen, lend me your ears!\n\nAfter the miraculous recovery of territory lost centuries ago, the Roman Empire has been reborn — divided as Theodosius always intended, between West and East, each half supporting the other against the chaos of the barbarian world."
 roman_restoration.0001.desc.greeks: "\n\nThe Roman State will no longer be referred to as the \"Empire of the Greeks\" by jealous pretenders in the West, but recognized as the true heir to the legacy of Rome — governing both halves of Theodosius's divided empire."
 roman_restoration.0001.desc.other: "\n\nWhere countless Greek pretenders failed, it took one [scoped_emperor.GetCulture.GetName] to succeed — restoring the Roman Empire and dividing it as Theodosius's wisdom demanded."
 roman_restoration.0001.desc.christians: "The Imperium Romanum stands strong once more, restored to its ancient glory under my enlightened rule. East and West are reunited under a single Hegemony, as God and Theodosius intended — ready to spread civilization, safety, and the holy light of Our Lord to all the corners of the known world. For the Senate and People of Rome!"
 roman_restoration.0001.desc.hellenics: "The Imperium Romanum stands strong once more, restored to its ancient glory and religion under my enlightened rule. \n\nAs Theodosius divided the Empire between the genius of East and West, so too shall my Rome be ordered — two empires, one Hegemony, one eternal Rome. For the Senate and People of Rome!"
 roman_restoration.0001.desc.fallback: "The Imperium Romanum stands strong once more, restored to its ancient glory under my enlightened rule. East and West reunited under Theodosius's ancient order — ready to spread civilization, safety, and the love of [ROOT.Char.GetFaith.HighGodName] to all the corners of the known world. For the Senate and People of Rome!"
 ep3_roman_restoration.0100.t: "Theodosius's Dream Realized"
 ep3_roman_restoration.0100.desc: "It is an auspicious day, for today the Empire of Romans realizes its ancient potential.\n\nFrom every corner of the empire can shouts of jubilation and pride be heard: #EMP Ecce Romani! Hail Caesar!#!\n\nAs Theodosius foresaw, no one man can govern so vast an empire alone. The West — centered on Rome and Italy — and the East — centered on Constantinople — shall each have their Empire, bound together under a single Roman Hegemony.\n\nBut I must now steer the sails of this vast enterprise. What will we make of this Rome?"
